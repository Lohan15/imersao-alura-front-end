<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LohanFlix</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══════════════════════════════════════
     PROFILE SELECTION PAGE
══════════════════════════════════════ -->
<div id="profilePage" class="page-profiles">
    <div class="profiles-bg">
        <div class="profiles-bg-reel"></div>
    </div>
    <div class="profiles-overlay"></div>

    <header class="profiles-header">
        <div class="logo">LOHAN<span>FLIX</span></div>
    </header>

    <main class="profiles-main">
        <p class="profiles-eyebrow">Selecione o perfil</p>
        <h1 class="profiles-title">Quem está <em>assistindo</em>?</h1>

        <div class="profiles-grid">
            <div class="profile-card" onclick="selectProfile('Lohan', 0)">
                <div class="profile-avatar av-0">
                    <span>L</span>
                    <div class="avatar-ring"></div>
                </div>
                <p class="profile-label">Lohan</p>
            </div>
            <div class="profile-card" onclick="selectProfile('Ana', 1)">
                <div class="profile-avatar av-1">
                    <span>A</span>
                    <div class="avatar-ring"></div>
                </div>
                <p class="profile-label">Ana</p>
            </div>
            <div class="profile-card" onclick="selectProfile('Carlos', 2)">
                <div class="profile-avatar av-2">
                    <span>C</span>
                    <div class="avatar-ring"></div>
                </div>
                <p class="profile-label">Carlos</p>
            </div>
            <div class="profile-card" onclick="selectProfile('Kids', 3)">
                <div class="profile-avatar av-3">
                    <span>K</span>
                    <div class="avatar-ring"></div>
                </div>
                <p class="profile-label">Kids</p>
            </div>
            <div class="profile-card profile-add" onclick="alert('Em breve!')">
                <div class="profile-avatar av-add">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <div class="avatar-ring"></div>
                </div>
                <p class="profile-label">Adicionar</p>
            </div>
        </div>

        <button class="manage-profiles-btn">Gerenciar Perfis</button>
    </main>
</div>

<!-- ══════════════════════════════════════
     BROWSE PAGE
══════════════════════════════════════ -->
<div id="browsePage" class="page-browse hidden">

    <!-- NAVBAR -->
    <nav class="navbar" id="navbar">
        <div class="nav-left">
            <div class="logo nav-logo">LOHAN<span>FLIX</span></div>
            <ul class="nav-links" id="navLinks">
                <li><a href="#" data-filter="all" class="active">Início</a></li>
                <li><a href="#" data-filter="tv">Séries</a></li>
                <li><a href="#" data-filter="movie">Filmes</a></li>
                <li><a href="#" data-filter="new">Novidades</a></li>
                <li><a href="#" data-filter="mylist">Minha Lista</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <button class="nav-icon-btn" id="searchToggle">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
            <div class="nav-search-bar" id="searchBar">
                <input type="text" placeholder="Títulos, pessoas, gêneros" id="searchInput" />
            </div>
            <button class="nav-icon-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            </button>
            <div class="nav-profile" id="navProfile" onclick="goBack()">
                <div class="nav-avatar" id="navAvatar"></div>
                <span id="navName"></span>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero" id="heroSection">
        <div class="hero-backdrop" id="heroBackdrop"></div>
        <div class="hero-trailer-wrap" id="heroTrailerWrap">
            <iframe id="heroTrailer" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <div class="hero-vignette"></div>
        <div class="hero-content" id="heroContent">
            <div class="hero-badges" id="heroBadges"></div>
            <h2 class="hero-title" id="heroTitle">Carregando…</h2>
            <div class="hero-meta" id="heroMeta"></div>
            <p class="hero-overview" id="heroOverview"></p>
            <div class="hero-actions">
                <button class="btn-primary" id="heroPlayBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                    Assistir
                </button>
                <button class="btn-secondary" id="heroInfoBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    Mais Detalhes
                </button>
                <button class="btn-icon-round" id="heroMuteBtn" title="Áudio">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="muteIcon"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                </button>
            </div>
        </div>
        <div class="hero-rank-badge" id="heroRank"></div>
    </section>

    <!-- ROWS -->
    <div class="rows-container" id="rowsContainer">
        <div class="loading-rows">
            <div class="skeleton-row"></div>
            <div class="skeleton-row"></div>
            <div class="skeleton-row"></div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="logo footer-logo">LOHAN<span>FLIX</span></div>
        <p>© 2025 LohanFlix. Projeto fictício para fins educacionais.</p>
        <p class="footer-tmdb">Dados fornecidos por <strong>TMDB</strong></p>
    </footer>
</div>

<!-- ══════════════════════════════════════
     MODAL
══════════════════════════════════════ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" id="modal">
        <button class="modal-close" onclick="closeModal()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>

        <div class="modal-hero">
            <img class="modal-backdrop" id="modalBackdrop" src="" alt="" />
            <div class="modal-hero-gradient"></div>
            <div class="modal-trailer-wrap" id="modalTrailerWrap">
                <iframe id="modalTrailer" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
            <div class="modal-hero-info">
                <h2 class="modal-title" id="modalTitle"></h2>
                <div class="modal-actions">
                    <button class="btn-primary btn-sm">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                        Assistir
                    </button>
                    <button class="btn-icon-round btn-sm" id="modalListBtn" title="Minha lista">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </button>
                    <button class="btn-icon-round btn-sm" title="Gostei">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="modal-body">
            <div class="modal-col-main">
                <div class="modal-meta" id="modalMeta"></div>
                <p class="modal-overview" id="modalOverview"></p>
            </div>
            <div class="modal-col-side">
                <div class="modal-tags" id="modalTags"></div>
            </div>
        </div>

        <div class="modal-similar" id="modalSimilar"></div>
    </div>
</div>

<!-- FLASH TRANSITION -->
<div class="transition-flash" id="transitionFlash">
    <div class="flash-logo">LOHAN<span>FLIX</span></div>
</div>

<script src="script.js"></script>
</body>
</html>
